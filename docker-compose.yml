services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # Optionnel : docker compose --profile tunnel up -d (nécessite NGROK_AUTHTOKEN + ngrok-config.yml)
  ngrok:
    profiles:
      - tunnel
    image: ngrok/ngrok:latest
    command: start --config /etc/ngrok.yml ollama
    volumes:
      - ./ngrok-config.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
